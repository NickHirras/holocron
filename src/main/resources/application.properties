# Default Configuration (Production-like)
quarkus.http.port=8080
quarkus.application.name=holocron

# Database - SQLite
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:data/holocron.db
quarkus.hibernate-orm.database.generation=update

# OIDC (Production)
quarkus.oidc.auth-server-url=https://placeholder-oidc-provider.com
quarkus.oidc.client-id=placeholder-id
quarkus.oidc.credentials.secret=placeholder-secret
quarkus.oidc.application-type=web-app

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# --- Development Profile ---
%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:holocron-dev.db
# Disable OIDC in dev mode to use local mock
%dev.quarkus.oidc.enabled=false
# Custom flag to enable dev-mode specific logic (mock auth, seeding)
%dev.holocron.auth.dev-mode=true
%dev.quarkus.hibernate-orm.log.sql=true

# --- Test Profile ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
