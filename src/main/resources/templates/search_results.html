{#if artifacts.isEmpty}
<div class="pico-muted-color" style="text-align: center; padding: 1rem;">
    No archives found matching "{query}".
</div>
{#else}
{#for artifact in artifacts}
<a href="/archives/{artifact.id}" class="contrast outline" role="button"
    style="display: block; margin-bottom: 1rem; text-align: left; animation: fade-in 0.3s ease-out;"
    hx-get="/archives/{artifact.id}" hx-target="#archive-detail" hx-swap="innerHTML transition:true" hx-push-url="true">
    <div style="font-size: 0.8rem; color: var(--holocron-cyan);">{artifact.periodEnd}</div>
    <div style="font-weight: bold;">{artifact.ceremony.title}</div>
    <div style="font-size: 0.7rem; color: var(--faded-transmission);">
        ID: {artifact.id}
    </div>
</a>
{/for}
{/if}
