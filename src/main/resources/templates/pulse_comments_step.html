<article class="debrief-panel step-enter" id="debrief-current-step" data-step="{stepIndex}" data-total="{totalSteps}">
    <header>
        <span class="step-indicator">FINAL QUERY {stepIndex + 1} / {totalSteps}</span>
    </header>
    <div class="debrief-question">
        <p class="typing-text" data-text="Anything else on your mind, Commander? Open channel..."></p>
    </div>
    <div class="debrief-input">
        <textarea name="comments" id="comments" rows="4"
            placeholder="General comments, shout-outs, or rants..."></textarea>
    </div>
    <footer class="debrief-actions">
        <button type="submit" id="transmit-btn" class="console-btn special-command">
            &#x1F4E1; TRANSMIT DATA
        </button>
    </footer>
</article>
