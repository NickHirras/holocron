<div class="operative-card question-item" data-id="{question.id}">
    <div class="card-header">
        <span class="operative-role">
            <i class="fas fa-grip-lines handle"
                style="cursor: grab; margin-right: 10px; color: var(--faded-transmission);"></i>
            SEQ-{question.sequence}
        </span>
        <span class="operative-name">{question.type} <span style="color: red;">DEBUG-REDIRECT</span></span>
        <div style="margin-left: auto;">
            <button class="console-btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem;"
                hx-post="/api/questions/{question.id}/delete" hx-vals='{"_method": "delete"}'
                hx-confirm="Are you sure you want to delete this parameter?" hx-target="closest .operative-card"
                hx-swap="outerHTML">
                DELETE
            </button>
        </div>
    </div>
    <p>{question.text}</p>
    <input type="hidden" name="questionId" value="{question.id}" />
</div>
