<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holocron | Ceremony Engine</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/pico.min.css">
    <link rel="stylesheet" href="/css/holocron.css">

    <!-- HTMX -->
    <script src="/js/htmx.min.js"></script>
</head>

<body hx-indicator="#global-indicator">
    <div id="global-indicator" class="htmx-indicator">
        DECRYPTING...
    </div>
    <header class="container">
        <nav>
            <ul>
                <li><strong>HOLOCRON</strong></li>
            </ul>
            <ul>
                {#if identity.isAnonymous()}
                <li><a href="/dev/auth/login" role="button" class="outline">Initialize</a></li>
                {#else}
                <li>
                    <a href="/profile"
                        style="margin-right: 1rem; color: var(--holocron-cyan); text-decoration: none;">Running as:
                        {identity.principal.name}</a>
                    <a href="/dev/auth/logout" role="button" class="outline contrast">Terminate</a>
                </li>
                {/if}
            </ul>
        </nav>
    </header>

    <main class="container">
        {#insert body /}
    </main>

    <footer class="container">
        <small>System Status: <span style="color: var(--forest-moon)">OPERATIONAL</span> // Holocron
            v1.0.0-ALPHA</small>
    </footer>
</body>

</html>
