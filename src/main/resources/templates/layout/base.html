<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holocron | Ceremony Engine</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/pico.min.css">
    <link rel="stylesheet" href="/css/holocron.css">

    <!-- HTMX -->
    <script src="/js/htmx.min.js"></script>
</head>

<body hx-indicator="#global-indicator">
    <div id="global-indicator" class="htmx-indicator">
        DECRYPTING...
    </div>

    <!-- Side Panel Trigger -->
    <div id="side-panel-trigger" onclick="toggleSidePanel()"></div>

    <!-- Side Panel Container (HTMX Loaded) -->
    <aside id="side-panel" hx-get="/components/side-panel" hx-trigger="load" hx-swap="innerHTML">
        <!-- Content loaded via HTMX -->
    </aside>

    <!-- 1. Top HUD (Heads Up Display) -->
    <header class="hud-header container-fluid">
        <div class="hud-left">
            <div id="kyber-status" class="kyber-hex status-neutral" title="System Status"></div>
            <span class="hud-label" id="connection-status">CONNECTED</span>
        </div>
        <div class="hud-center">
            <h1 class="hud-title">HOLOCRON <span class="version">v1.0.0-ALPHA</span></h1>
        </div>
        <div class="hud-right">
            <span class="hud-label" id="system-time">--:--:--</span>
            <span class="hud-separator">|</span>
            <span class="hud-label">{#if identity.isAnonymous()}UNIDENTIFIED{#else}{identity.principal.name}{/if}</span>
        </div>
    </header>

    <!-- 2. Main Content Area (Holographic Projection) -->
    <main id="main-content" class="container hologram-container">
        <div class="hologram-overlay"></div>
        <div class="boot-sequence">
            {#insert body /}
        </div>
    </main>



    <script>
        // System Time
        function updateTime() {
            const now = new Date();
            document.getElementById('system-time').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Side Panel Toggle
        function toggleSidePanel() {
            document.getElementById('side-panel').classList.toggle('open');
        }

        // Close side panel when clicking outside
        document.addEventListener('click', function (event) {
            const panel = document.getElementById('side-panel');
            const trigger = document.getElementById('side-panel-trigger');
            if (!panel.contains(event.target) && !trigger.contains(event.target) && panel.classList.contains('open')) {
                panel.classList.remove('open');
            }
        });

        // HTMX Connection Status Monitoring
        document.body.addEventListener('htmx:beforeRequest', function (evt) {
            const hex = document.getElementById('kyber-status');
            const label = document.getElementById('connection-status');
            hex.className = 'kyber-hex status-active'; // Pulse green
            label.innerText = "TRANSMITTING...";
        });

        document.body.addEventListener('htmx:afterRequest', function (evt) {
            const hex = document.getElementById('kyber-status');
            const label = document.getElementById('connection-status');
            if (evt.detail.successful) {
                hex.className = 'kyber-hex status-neutral'; // Cyan/Idle
                label.innerText = "CONNECTED";
            } else {
                hex.className = 'kyber-hex status-alert'; // Red blink
                label.innerText = "SIGNAL LOST";
            }
        });

        document.body.addEventListener('htmx:sendError', function (evt) {
            const hex = document.getElementById('kyber-status');
            const label = document.getElementById('connection-status');
            hex.className = 'kyber-hex status-alert';
            label.innerText = "OFFLINE";
        });
    </script>
</body>

</html>
